<!DOCTYPE html>
<html lang="en" xmlns:th="https://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>All Investments</title>

    <link rel="stylesheet"
          href="https://stackpath.bootstrapcdn.com/bootstrap/4.1.3/css/bootstrap.min.css">

    <style>

        body{
            background-color:#F4FFF6;
            font-weight:bold;
            font-family:Arial, sans-serif;
        }

        .container{
            max-width:1100px;
            margin:auto;
            margin-top:40px;
            background:white;
            padding:30px;
            border-radius:15px;
            box-shadow:0px 4px 12px rgba(0,0,0,0.1);
        }

        h1{
            text-align:center;
            color:#0B6623;
            font-weight:bold;
        }

        table{
            margin-top:20px;
        }

        th{
            background-color:#C8FACC;
            color:#0B6623;
            text-align:center;
        }

        td{
            text-align:center;
        }

        .btn-update{
            background-color:#A3E4A9;
            color:#0B6623;
            border-radius:20px;
            padding:5px 12px;
            text-decoration:none;
        }

        .btn-delete{
            background-color:#FFB3B3;
            color:#8B0000;
            border-radius:20px;
            padding:5px 12px;
            text-decoration:none;
        }

        .top-btn{
            display:block;
            width:250px;
            margin:20px auto;
            text-align:center;
            background-color:#C8FACC;
            padding:10px;
            border-radius:25px;
            color:#0B6623;
            text-decoration:none;
        }

    </style>

</head>

<body>

<div class="container">

    <h1>Investments</h1>
    <hr>

    <!-- Add New Investment Button -->
    <a th:href="@{/investment/new}" class="top-btn">
        Add New Investment
    </a>

    <table class="table table-bordered">

        <thead>
        <tr>
            <th>ID</th>
            <th>Bank</th>
            <th>Scheme</th>
            <th>Principal</th>
            <th>Interest %</th>
            <th>Start Date</th>
            <th>Maturity Date</th>
            <th>Maturity Value</th>
            <th>Status</th>
            <th>Actions</th>
        </tr>
        </thead>

        <tbody>

        <tr th:each="inv : ${allInvestments}">

            <td th:text="${inv.investId}"></td>
            <td th:text="${inv.bankName}"></td>
            <td th:text="${inv.schemeName}"></td>
            <td th:text="${inv.principal}"></td>
            <td th:text="${inv.interestRate}"></td>
            <td th:text="${inv.startDate}"></td>
            <td th:text="${inv.maturityDate}"></td>
            <td th:text="${inv.maturityValue}"></td>

            <!-- Status with color -->
            <td>
                <span th:if="${inv.status.name() == 'ACTIVE'}" style="color:green;">Active</span>
                <span th:if="${inv.status.name() == 'MATURED'}" style="color:orange;">Matured</span>
                <span th:if="${inv.status.name() == 'CLOSED'}" style="color:red;">Closed</span>
            </td>

            <td>
                <a th:href="@{/update-investment/{id}(id=${inv.investId})}"
                   class="btn-update">Update</a>

                <a th:href="@{/delete-investment/{id}(id=${inv.investId})}"
                   class="btn-delete"
                   onclick="return confirm('Are you sure you want to delete this investment?')">
                    Delete
                </a>
            </td>

        </tr>

        </tbody>

    </table>

</div>

</body>
</html>
