<!DOCTYPE html>
<html lang="en" xmlns:th="https://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Error</title>

    <link rel="stylesheet"
          href="https://stackpath.bootstrapcdn.com/bootstrap/4.1.3/css/bootstrap.min.css">

    <style>
        body{
            background-color:#F4FFF6;
            font-family:Arial;
        }

        .container{
            margin-top:100px;
            text-align:center;
        }

        .error-box{
            background:white;
            padding:30px;
            border-radius:15px;
            box-shadow:0px 4px 12px rgba(0,0,0,0.1);
        }

        .btn-home{
            margin-top:20px;
            background-color:#C8FACC;
            border:none;
            padding:10px 20px;
            border-radius:20px;
            color:#0B6623;
            text-decoration:none;
        }
    </style>

</head>

<body>

<div class="container">
    <div class="error-box">

        <h2 style="color:red;">Error</h2>

        <p th:text="${errorMsg}"></p>

        <a th:href="@{/customers/view}" class="btn-home">Go Back</a>

    </div>
</div>

</body>
</html>
