<!DOCTYPE html>
<html lang="en" xmlns:th="https://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Update Customer Details</title>

    <link rel="stylesheet"
          href="https://stackpath.bootstrapcdn.com/bootstrap/4.1.3/css/bootstrap.min.css">

    <style>

        body{
            background-color:#F4FFF6; /* light green background */
            font-weight:bold;
            font-family:Arial, sans-serif;
        }

        .container{
            max-width:500px;
            margin:auto;
            text-align:center;
            margin-top:40px;
            background:white;
            padding:30px;
            border-radius:15px;
            box-shadow:0px 4px 12px rgba(0,0,0,0.1);
        }

        h1{
            color:#0B6623; /* dark green */
            margin-bottom:10px;
            font-weight:bold;
        }

        h2{
            color:#0B6623; /* dark green */
            font-size:22px;
            margin-bottom:30px;
            font-weight:bold;
        }

        .form-control{
            border-radius:10px;
            text-align:center;
            font-weight:bold;
            border:1px solid #A3E4A9;
        }

        .form-control:focus{
            border-color:#0B6623;
            box-shadow:0 0 5px rgba(11,102,35,0.3);
        }

        .cust-btn{
            background-color:#C8FACC; /* light green */
            border:none;
            border-radius:25px;
            padding:12px 30px;
            color:#0B6623; /* dark green text */
            font-weight:bold;
            width:60%;
        }

        .cust-btn:hover{
            background-color:#A3E4A9;
            color:#0B6623;
        }

    </style>

</head>

<body>

<div class="container">

    <h1>MaturityAlert</h1>
    <hr>

    <h2>Update Customer Details</h2>

    <form action="#" th:action="@{/customer/save}" th:object="${custDetails}" method="POST">

        <input type="hidden" th:field="*{custId}" />

        <input type="text"
               th:field="*{custName}"
               class="form-control mb-4"
               placeholder="Name of Customer">

        <input type="text"
               th:field="*{custPhone}"
               class="form-control mb-4"
               placeholder="Customer Phone Number">

        <input type="text"
               th:field="*{custEmail}"
               class="form-control mb-4"
               placeholder="Customer Email ID">

        <button type="submit" class="btn cust-btn">
            Update Customer Details
        </button>

    </form>

</div>

</body>
</html>
