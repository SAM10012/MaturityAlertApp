<!DOCTYPE html>
<html lang="en" xmlns:th="https://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Add New Investment</title>

    <link rel="stylesheet"
          href="https://stackpath.bootstrapcdn.com/bootstrap/4.1.3/css/bootstrap.min.css">

    <style>

        body{
            background-color:#F4FFF6;
            font-weight:bold;
            font-family:Arial, sans-serif;
        }

        .container{
            max-width:600px;
            margin:auto;
            text-align:center;
            margin-top:40px;
            background:white;
            padding:30px;
            border-radius:15px;
            box-shadow:0px 4px 12px rgba(0,0,0,0.1);
        }

        h1{
            color:#0B6623;
            margin-bottom:10px;
            font-weight:bold;
        }

        h2{
            color:#0B6623;
            font-size:22px;
            margin-bottom:25px;
            font-weight:bold;
        }

        .form-control{
            border-radius:10px;
            text-align:center;
            font-weight:bold;
            border:1px solid #A3E4A9;
        }

        .form-control:focus{
            border-color:#0B6623;
            box-shadow:0 0 5px rgba(11,102,35,0.3);
        }

        .cust-btn{
            background-color:#C8FACC;
            border:none;
            border-radius:25px;
            padding:12px 30px;
            color:#0B6623;
            font-weight:bold;
            width:70%;
        }

        .cust-btn:hover{
            background-color:#A3E4A9;
            color:#0B6623;
        }

    </style>

</head>

<body>

<div class="container">

    <h1>MaturityAlert</h1>
    <hr>

    <h2>Enter Investment Details</h2>

    <form th:action="@{/investment/save}" th:object="${investDetails}" method="POST">

        <input type="hidden" th:field="*{customer.custId}">

        <input type="text"
               th:field="*{bankName}"
               placeholder="Bank Name"
               class="form-control mb-3">

        <input type="text"
               th:field="*{schemeName}"
               placeholder="Scheme Name"
               class="form-control mb-3">

        <input type="number"
               th:field="*{depositAccountNum}"
               placeholder="Deposit Account Number"
               class="form-control mb-3">

        <input type="number" step="0.01"
               th:field="*{principal}"
               placeholder="Principal Amount"
               class="form-control mb-3">

        <input type="number" step="0.01"
               th:field="*{interestRate}"
               placeholder="Interest Rate (%)"
               class="form-control mb-3">

        <input type="date"
               th:field="*{startDate}"
               class="form-control mb-3">

        <input type="date"
               th:field="*{maturityDate}"
               class="form-control mb-3">

        <input type="number"
               th:field="*{creditAccountNum}"
               placeholder="Credit Account Number"
               class="form-control mb-3">


        <!-- ✅ Investment Status Dropdown -->
        <select th:field="*{status}" class="form-control mb-4">
            <option th:each="s : ${T(com.pauls.maturity_alert.model.InvestmentStatus).values()}"
                    th:value="${s}"
                    th:text="${s}">
            </option>
        </select>

        <button type="submit" class="btn cust-btn">
            Add New Investment
        </button>

    </form>

</div>

</body>
</html>
