<!DOCTYPE html>
<html lang="en" xmlns:th="https://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>MaturityAlert</title>

    <link rel="stylesheet"
          href="https://stackpath.bootstrapcdn.com/bootstrap/4.1.3/css/bootstrap.min.css">

    <style>

        body{
            background-color:#F4FFF6;   /* light green background */
            font-weight:bold;
            font-family: Arial, sans-serif;
        }

        h1{
            color:#0B6623;  /* dark green */
            text-align:center;
            margin-bottom:40px;
            font-weight:bold;
        }

        .button-container{
            display:flex;
            flex-direction:column;
            align-items:center;
            gap:20px;
        }

        .maturity-alert-app-btn{
            background-color:#C8FACC;  /* light green button */
            border:none;
            border-radius:25px;
            padding:12px 25px;
            width:260px;
            text-align:center;
            font-weight:bold;
            color:#0B6623; /* dark green text */
        }

        .maturity-alert-app-btn:hover{
            background-color:#A3E4A9; /* hover effect */
            color:#0B6623;
        }

    </style>

</head>

<body>

<div class="container my-5">

    <h1>Welcome to MaturityAlert</h1>

    <div class="button-container">

        <a th:href="@{/customer/new}" class="btn maturity-alert-app-btn">
            Add New Customer
        </a>

        <a th:href="@{/customers/view}" class="btn maturity-alert-app-btn">
            View All Customers
        </a>

        <a th:href="@{/investments/view}" class="btn maturity-alert-app-btn">
            View All Investments
        </a>

    </div>

</div>

</body>
</html>
