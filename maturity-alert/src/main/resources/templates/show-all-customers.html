<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.w3.org/1999/xhtml">
<head>
    <meta charset="UTF-8">
    <title>MaturityAlert</title>

    <link rel="stylesheet"
          href="https://stackpath.bootstrapcdn.com/bootstrap/4.1.3/css/bootstrap.min.css">

    <style>

        body{
            background-color:#F8F6FB;
            font-weight:bold;
        }

        /* Main heading */
        h1{
            color:#6A0DAD;
            font-weight:bold;
            text-align:center;
            margin-bottom:30px;
        }

        /* Table center alignment */
        table{
            text-align:center;
        }

        /* Column headings */
        th{
            color:#6A0DAD;
            font-weight:bold;
            text-align:center;
        }

        /* Table cells */
        td{
            text-align:center;
            vertical-align:middle;
        }

        /* Update button */
        .update-btn{
            background-color:#B8F5B8;   /* light green */
            color:black;
            font-weight:bold;
            border:none;
            margin-right:5px;
        }

        /* Delete button */
        .delete-btn{
            background-color:#FFB6B6;   /* light red */
            color:black;
            font-weight:bold;
            border:none;
        }

    </style>

</head>

<body>

<div class="container my-4">

    <h1>Customers</h1>

    <table border="1" class="table table-striped table-responsive-md">

        <thead>
        <tr>
            <th>Customer Name</th>
            <th>Customer Phone Number</th>
            <th>Customer Email ID</th>
            <th>Actions</th>

        </tr>
        </thead>

        <tbody>

        <tr th:each="custInfo : ${allCustomers}">

            <td th:text="${custInfo.custName}"></td>
            <td th:text="${custInfo.custPhone}"></td>
            <td th:text="${custInfo.custEmail}"></td>
            <td>

                <a th:href="@{/update-customer/{id}(id=${custInfo.custId})}"
                   class="btn update-btn">
                    Update
                </a>

                <a th:href="@{/delete-customer/{id}(id=${custInfo.custId})}"
                   class="btn delete-btn"
                   onclick="return confirm('Are you sure you want to delete this customer?')">
                    Delete
                </a>

            </td>

        </tr>

        </tbody>

    </table>

</div>

</body>
</html>
