<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.w3.org/1999/xhtml">
<head>
    <meta charset="UTF-8">
    <title>MaturityAlert</title>

    <link rel="stylesheet"
          href="https://stackpath.bootstrapcdn.com/bootstrap/4.1.3/css/bootstrap.min.css">

    <style>

        body{
            background-color:#F4FFF6;
            font-weight:bold;
            font-family:Arial, sans-serif;
        }

        .container{
            max-width:900px;
            margin:auto;
            margin-top:40px;
            background:white;
            padding:30px;
            border-radius:15px;
            box-shadow:0px 4px 12px rgba(0,0,0,0.1);
        }

        h1{
            text-align:center;
            color:#0B6623;
            font-weight:bold;
        }

        table{
            margin-top:20px;
        }

        th{
            background-color:#C8FACC;
            color:#0B6623;
            text-align:center;
        }

        td{
            text-align:center;
            vertical-align:middle;
        }

        /* FLEX container for buttons */
        .btn-group-custom{
            display:flex;
            justify-content:center;
            gap:5px;   /* 👈 EXACT spacing */
        }

        .update-btn{
            background-color:#A3E4A9;
            color:#0B6623;
            border-radius:20px;
            padding:5px 12px;
            text-decoration:none;
        }

        .delete-btn{
            background-color:#FFB3B3;
            color:#8B0000;
            border-radius:20px;
            padding:5px 12px;
            text-decoration:none;
        }

    </style>

</head>

<body>

<div class="container">

    <h1>Users</h1>
    <hr>

    <table class="table table-bordered">

        <thead>
        <tr>
            <th>User Name</th>
            <th>User Phone Number</th>
            <th>User Email ID</th>
            <th>Actions</th>
            <th>Investments</th>
        </tr>
        </thead>

        <tbody>

        <tr th:each="custInfo : ${allCustomers}">

            <td th:text="${custInfo.custName}"></td>
            <td th:text="${custInfo.custPhone}"></td>
            <td th:text="${custInfo.custEmail}"></td>

            <!-- Actions -->
            <td>
                <div class="btn-group-custom">
                    <a th:href="@{/update-customer/{id}(id=${custInfo.custId})}"
                       class="update-btn">
                        Update
                    </a>

                    <a th:href="@{/delete-customer/{id}(id=${custInfo.custId})}"
                       class="delete-btn"
                       onclick="return confirm('Are you sure you want to delete this customer?')">
                        Delete
                    </a>
                </div>
            </td>

            <!-- Investments -->
            <td>
                <div class="btn-group-custom">
                    <a th:href="@{/investment/new/{id}(id=${custInfo.custId})}"
                       class="update-btn">
                        Add
                    </a>

                    <a th:href="@{/investments/view/{id}(id=${custInfo.custId})}"
                       class="update-btn">
                        View
                    </a>

                </div>
            </td>

        </tr>

        </tbody>

    </table>

</div>

</body>
</html>
