<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.w3.org/1999/xhtml">
<head>
    <meta charset="UTF-8">
    <title>MaturityAlert</title>

    <link rel="stylesheet"
          href="https://stackpath.bootstrapcdn.com/bootstrap/4.1.3/css/bootstrap.min.css">

    <style>

        body{
            background-color:#F4FFF6;
            font-weight:bold;
            font-family:Arial, sans-serif;
        }

        .container{
            max-width:900px;
            margin:auto;
            margin-top:40px;
            background:white;
            padding:30px;
            border-radius:15px;
            box-shadow:0px 4px 12px rgba(0,0,0,0.1);
        }

        /* Heading */
        h1{
            text-align:center;
            color:#0B6623;
            font-weight:bold;
        }

        table{
            margin-top:20px;
        }

        /* Table headers */
        th{
            background-color:#C8FACC;
            color:#0B6623;
            text-align:center;
        }

        /* Table cells */
        td{
            text-align:center;
            vertical-align:middle;
        }

        /* Update button */
        .update-btn{
            background-color:#A3E4A9;
            color:#0B6623;
            border-radius:20px;
            padding:5px 12px;
            text-decoration:none;
            margin-right:5px;
        }

        /* Delete button */
        .delete-btn{
            background-color:#FFB3B3;
            color:#8B0000;
            border-radius:20px;
            padding:5px 12px;
            text-decoration:none;
        }

        /* Optional top button (if you add later) */
        .top-btn{
            display:block;
            width:250px;
            margin:20px auto;
            text-align:center;
            background-color:#C8FACC;
            padding:10px;
            border-radius:25px;
            color:#0B6623;
            text-decoration:none;
        }

    </style>

</head>

<body>

<div class="container">

    <h1>Customers</h1>
    <hr>

    <table class="table table-bordered">

        <thead>
        <tr>
            <th>Customer Name</th>
            <th>Customer Phone Number</th>
            <th>Customer Email ID</th>
            <th>Actions</th>
        </tr>
        </thead>

        <tbody>

        <tr th:each="custInfo : ${allCustomers}">

            <td th:text="${custInfo.custName}"></td>
            <td th:text="${custInfo.custPhone}"></td>
            <td th:text="${custInfo.custEmail}"></td>

            <td>
                <a th:href="@{/update-customer/{id}(id=${custInfo.custId})}"
                   class="update-btn">
                    Update
                </a>

                <a th:href="@{/delete-customer/{id}(id=${custInfo.custId})}"
                   class="delete-btn"
                   onclick="return confirm('Are you sure you want to delete this customer?')">
                    Delete
                </a>
            </td>

        </tr>

        </tbody>

    </table>

</div>

</body>
</html>
